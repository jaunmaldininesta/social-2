<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Poster Generator</title>

    <style>
        @font-face {
            font-family: "Juventus";
            src: url("juventus.woff2") format("woff2"),
                url("juventus.ttf") format("truetype");
        }

        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
            max-width: 100%;
            justify-content: center;
            z-index: 1000;
        }

        input,
        button,
        select {
            padding: 8px 12px;
            font-size: 13px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
        }

        input[type="text"] {
            background: #111;
        }

        button {
            background: #d40000;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* Mobile viewport boundary container */
        #viewport-container {
            width: 100%;
            max-width: 600px;
            height: 70vh;
            border: 2px solid #333;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            touch-action: none;
            border-radius: 8px;
        }

        #workspace {
            position: absolute;
            transform-origin: 0 0;
            width: 1080px;
            height: 1080px;
        }

        #canvas {
            width: 1080px;
            height: 1080px;
            position: absolute;
            overflow: hidden;
            background: #111;
            top: 0;
            left: 0;
        }

        .guide-h,
        .guide-v {
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            display: none;
            z-index: 999;
        }

        .guide-h {
            width: 100%;
            height: 1px;
            top: 50%;
        }

        .guide-v {
            height: 100%;
            width: 1px;
            left: 50%;
        }

        #bg {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .red-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.15),
                    rgba(0, 0, 0, 0.9));
            pointer-events: none;
        }

        .logo {
            position: absolute;
            width: 80px;
            height: 80px;
            object-fit: contain;
            top: 25px;
            pointer-events: none;
        }

        .logo.left {
            left: 25px;
        }

        .logo.right {
            right: 25px;
        }

        .draggable {
            position: absolute;
            cursor: move;
            user-select: text;
            -webkit-user-select: text;
            touch-action: none;
            padding: 10px;
            border: 1px dashed transparent;
        }

        /* Visual cue for mobile interaction states */
        .draggable:match-border,
        .draggable:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .title,
        .sub,
        .btn {
            color: #fff;
            font-family: "Juventus", Arial, sans-serif;
            text-align: center;
            width: max-content;
        }

        .title {
            font-size: 34px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sub {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.4;
        }

        .highlight {
            display: inline-block;
            background: #d40000;
            padding: 6px 14px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .btn {
            display: inline-block;
            background: #d40000;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
        }

        [contenteditable="true"] {
            outline: none;
        }
    </style>
</head>

<body>

    <div class="controls">
        <input type="file" id="bgUpload">
        <input type="text" id="bgURL" placeholder="Player Image URL">
        <button onclick="setImage('bgURL','#bg')">Set Player</button>

        <input type="file" id="logo1Upload">
        <input type="text" id="logo1URL" placeholder="Logo 1 URL">
        <button onclick="setImage('logo1URL','.logo.left')">Set Logo 1</button>

        <input type="file" id="logo2Upload">
        <input type="text" id="logo2URL" placeholder="Logo 2 URL">
        <button onclick="setImage('logo2URL','.logo.right')">Set Logo 2</button>

        <select id="fontPicker" onchange="changeFont(this.value)">
            <option value="Juventus">Juventus</option>
            <option value="Roboto">Roboto</option>
            <option value="Montserrat">Montserrat</option>
            <option value="Bebas Neue">Bebas Neue</option>
            <option value="Poppins">Poppins</option>
        </select>

        <select id="sizeSelect">
            <option value="1080">1080 × 1080</option>
            <option value="2000">2000 × 2000</option>
        </select>

        <button id="downloadBtn">Download Poster</button>
    </div>

    <div id="viewport-container">
        <div id="workspace">
            <div id="canvas">

                <div class="guide-h" id="guideH"></div>
                <div class="guide-v" id="guideV"></div>

                <img id="bg" src="player.jpg">
                <div class="red-bg"></div>

                <img class="logo left" src="logo1.png">
                <img class="logo right" src="logo2.png">

                <div id="title" class="draggable title" contenteditable="false"
                    style="top:140px; left:540px; transform: translate(-50%, 0);">
                    THE STRUGGLE FOR MINUTES:
                </div>

                <div id="sub" class="draggable sub" contenteditable="false"
                    style="top:520px; left:540px; transform: translate(-50%, 0);">
                    <span class="highlight">MAX IBRAHIMOVIĆ</span> AT
                    <span class="highlight">AJAX</span>
                </div>

                <div id="btn" class="draggable btn" contenteditable="false"
                    style="top:780px; left:540px; transform: translate(-50%, 0);">
                    READ MORE
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const fonts = {
            "Roboto": "Roboto:wght@400;700;900",
            "Montserrat": "Montserrat:wght@400;700;900",
            "Bebas Neue": "Bebas+Neue",
            "Poppins": "Poppins:wght@400;700;900"
        };

        function changeFont(f) {
            if (f === "Juventus") {
                document.getElementById("canvas").style.fontFamily = "Juventus, Arial";
                return;
            }
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = `https://fonts.googleapis.com/css2?family=${fonts[f]}&display=swap`;
            document.head.appendChild(link);
            document.getElementById("canvas").style.fontFamily = `"${f}", Arial`;
        }

        document.getElementById("downloadBtn").addEventListener("click", () => {
            const size = parseInt(document.getElementById("sizeSelect").value);

            // Reset temporary zoom settings to extract clean 1080 original composition
            const oldWTransform = workspace.style.transform;
            workspace.style.transform = "scale(1) translate(0px, 0px)";

            html2canvas(document.getElementById("canvas"), {
                scale: size / 1080,
                useCORS: true,
                backgroundColor: null,
                width: 1080,
                height: 1080
            }).then(canvas => {
                workspace.style.transform = oldWTransform;
                const a = document.createElement("a");
                a.download = `football-poster-${size}.png`;
                a.href = canvas.toDataURL("image/png");
                a.click();
            });
        });

        function bindUpload(id, target) {
            document.getElementById(id).addEventListener("change", e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    document.querySelector(target).src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        bindUpload("bgUpload", "#bg");
        bindUpload("logo1Upload", ".logo.left");
        bindUpload("logo2Upload", ".logo.right");

        function setImage(id, sel) {
            const url = document.getElementById(id).value.trim();
            if (url) document.querySelector(sel).src = url;
        }

        // --- CORE MOBILE WORKSPACE MOTOR (PAN & PINCH-ZOOM) ---
        const viewContainer = document.getElementById("viewport-container");
        const workspace = document.getElementById("workspace");
        const guideH = document.getElementById("guideH");
        const guideV = document.getElementById("guideV");

        let panX = 0, panY = 0, zoom = 1;
        let isPanning = false;
        let startTouchesDist = 0;
        let startZoom = 1;
        let touchStartPanX = 0, touchStartPanY = 0;

        // Auto-fit unscaled canvas safely into your device view metrics initially
        function initFit() {
            zoom = viewContainer.clientWidth / 1080;
            panX = 0;
            panY = 0;
            updateWorkspaceTransform();
        }
        window.addEventListener("load", initFit);
        window.addEventListener("resize", initFit);

        function updateWorkspaceTransform() {
            workspace.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }

        // --- INTEGRATED INTERACTION HANDLERS ---
        let active = null;
        let offsetX = 0, offsetY = 0;
        let lastTap = 0;

        // Clean element translation handling accounting for scale variances
        function handleStart(clientX, clientY, targetEl, isTouch) {
            if (targetEl.contentEditable === "true") return;

            active = targetEl;
            // Strip structural 'translate(-50%)' fallback on first interaction safely
            if (active.style.transform.includes("translate")) {
                const rect = active.getBoundingClientRect();
                const canvRect = document.getElementById("canvas").getBoundingClientRect();
                active.style.left = ((rect.left - canvRect.left) / zoom) + "px";
                active.style.transform = "none";
            }

            const elLeft = parseFloat(active.style.left) || 0;
            const elTop = parseFloat(active.style.top) || 0;

            const canvRect = document.getElementById("canvas").getBoundingClientRect();
            const canvasX = (clientX - canvRect.left) / zoom;
            const canvasY = (clientY - canvRect.top) / zoom;

            offsetX = canvasX - elLeft;
            offsetY = canvasY - elTop;
        }

        function handleMove(clientX, clientY) {
            if (!active) return;

            const canvRect = document.getElementById("canvas").getBoundingClientRect();
            let x = (clientX - canvRect.left) / zoom - offsetX;
            let y = (clientY - canvRect.top) / zoom - offsetY;

            const cx = 540;
            const cy = 540;
            const SNAP_CENTER = 20;
            const GRID = 20;

            guideH.style.display = "block";
            guideV.style.display = "block";
            guideH.style.top = cy + "px";
            guideV.style.left = cx + "px";

            if (Math.abs(x + active.offsetWidth / 2 - cx) < SNAP_CENTER) {
                x = cx - active.offsetWidth / 2;
                guideV.style.background = "red";
            } else {
                guideV.style.background = "rgba(255,255,255,0.25)";
            }

            if (Math.abs(y + active.offsetHeight / 2 - cy) < SNAP_CENTER) {
                y = cy - active.offsetHeight / 2;
                guideH.style.background = "red";
            } else {
                guideH.style.background = "rgba(255,255,255,0.25)";
            }

            x = Math.round(x / GRID) * GRID;
            y = Math.round(y / GRID) * GRID;

            active.style.left = x + "px";
            active.style.top = y + "px";
        }

        // --- GLOBAL EVENT ROUTER ---
        document.querySelectorAll(".draggable").forEach(el => {
            // Desktop Mouse Listeners
            el.addEventListener("mousedown", (e) => {
                if (e.button !== 0) return;
                handleStart(e.clientX, e.clientY, el, false);
            });

            // Mobile Smart Touch Router (Double Tap to Focus text / Single Tap to Move)
            el.addEventListener("touchstart", (e) => {
                const now = Date.now();
                if (now - lastTap < 300) {
                    // Activate Text Editing
                    el.contentEditable = "true";
                    el.focus();
                    active = null;
                } else {
                    if (el.contentEditable !== "true") {
                        handleStart(e.touches[0].clientX, e.touches[0].clientY, el, true);
                    }
                }
                lastTap = now;
            }, { passive: true });

            el.addEventListener("blur", () => {
                el.contentEditable = "false";
            });
        });

        // Viewport Interaction Logic (Distinguishing dragging text from zooming layout)
        viewContainer.addEventListener("touchstart", (e) => {
            if (e.touches.length === 1 && !active) {
                isPanning = true;
                touchStartPanX = e.touches[0].clientX - panX;
                touchStartPanY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isPanning = false;
                active = null;
                startTouchesDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                startZoom = zoom;
            }
        }, { passive: true });

        window.addEventListener("touchmove", (e) => {
            if (active && e.touches.length === 1) {
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
                if (e.cancelable) e.preventDefault();
            } else if (isPanning && e.touches.length === 1) {
                panX = e.touches[0].clientX - touchStartPanX;
                panY = e.touches[0].clientY - touchStartPanY;
                updateWorkspaceTransform();
            } else if (e.touches.length === 2) {
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                zoom = Math.max(0.1, Math.min(4, startZoom * (currentDist / startTouchesDist)));
                updateWorkspaceTransform();
            }
        }, { passive: false });

        // Desktop fallback listeners for workspace panning
        viewContainer.addEventListener("mousedown", (e) => {
            if (!active && e.button === 0) {
                isPanning = true;
                touchStartPanX = e.clientX - panX;
                touchStartPanY = e.clientY - panY;
            }
        });

        window.addEventListener("mousemove", (e) => {
            if (active) {
                handleMove(e.clientX, e.clientY);
            } else if (isPanning) {
                panX = e.clientX - touchStartPanX;
                panY = e.clientY - touchStartPanY;
                updateWorkspaceTransform();
            }
        });

        const handleEnd = () => {
            active = null;
            isPanning = false;
            guideH.style.display = "none";
            guideV.style.display = "none";
        };

        window.addEventListener("mouseup", handleEnd);
        window.addEventListener("touchend", handleEnd);
    </script>

</body>

</html>
